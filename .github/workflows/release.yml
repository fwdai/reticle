name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            deno_triple: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            deno_triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            deno_triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            deno_triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Download Deno sidecar
        shell: bash
        run: |
          DENO_VERSION=$(curl -fsSL "https://api.github.com/repos/denoland/deno/releases/latest" | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          TRIPLE="${{ matrix.deno_triple }}"
          DEST="src-tauri/binaries"
          mkdir -p "$DEST"
          if [[ "$TRIPLE" == *windows* ]]; then
            INNER="deno.exe"; OUT="deno-${TRIPLE}.exe"
          else
            INNER="deno"; OUT="deno-${TRIPLE}"
          fi
          curl -fsSL "https://github.com/denoland/deno/releases/download/v${DENO_VERSION}/deno-${TRIPLE}.zip" -o "$RUNNER_TEMP/deno.zip"
          unzip -q "$RUNNER_TEMP/deno.zip" "$INNER" -d "$RUNNER_TEMP/deno-out"
          mv "$RUNNER_TEMP/deno-out/$INNER" "${DEST}/${OUT}"
          chmod +x "${DEST}/${OUT}" 2>/dev/null || true

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Reticle v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: true
          prerelease: false
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
